version: "3.8"

services:
  adguard:
    image: adguard/adguardhome
    container_name: adguard
    restart: always
    ports:
      - "53:53/tcp"
      - "53:53/udp"
      - "8081:80"
    volumes:
      - adguard_work:/opt/adguardhome/work
      - adguard_conf:/opt/adguardhome/conf
    networks:
      - web
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.adguard.rule=Host(`dns.pinomagana.local`)"
      - "traefik.http.services.adguard.loadbalancer.server.port=80"

networks:
  web:
    external: true

volumes:
  adguard_work:
  adguard_conf: