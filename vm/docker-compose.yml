services:
  webtop:
    image: ghcr.io/linuxserver/webtop:latest
    container_name: webtop
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/Merida
    volumes:
      - /path/to/data:/config
    ports:
      - 3000:3000
      - 3001:3001
    networks:
      - web
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=web"
      - "traefik.http.routers.filebrowser.rule=Host(`webtop.pinomagana.local`)"
      - "traefik.http.services.filebrowser.loadbalancer.server.port=3000"
    shm_size: "3gb"
    restart: unless-stopped

networks:
  web:
    external: true