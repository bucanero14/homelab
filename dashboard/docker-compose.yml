version: "3.8"

services:
  homarr:
    image: ghcr.io/homarr-labs/homarr:latest
    container_name: homarr
    restart: always
    environment:
      - TZ=America/Merida
      - SECRET_ENCRYPTION_KEY=89fc741b78570babe3b60c9ae5b59f948011a7e1a7d6a633ea581c1269e82935
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./homarr/appdata:/appdata
    networks:
      - web
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=web"
      - "traefik.http.routers.homarr.rule=Host(`home.pinomagana.local`)"
      - "traefik.http.services.homarr.loadbalancer.server.port=7575"

networks:
  web:
    external: true