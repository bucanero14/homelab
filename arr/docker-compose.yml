version: "3.8"

services:
  # ======================
  # DOWNLOAD CLIENTS
  # ======================

  qbittorrent:
    image: lscr.io/linuxserver/qbittorrent:latest
    container_name: qbittorrent
    restart: unless-stopped
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/Merida
      - WEBUI_PORT=8080
    volumes:
      - ./config/qbittorrent:/config
      - /mnt/storage/DATA/Downloads:/downloads
    networks:
      - web
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.qbit.rule=Host(`qbit.pinomagana.local`)"
      - "traefik.http.services.qbit.loadbalancer.server.port=8080"

  nzbget:
    image: lscr.io/linuxserver/nzbget:latest
    container_name: nzbget
    restart: unless-stopped
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/Merida
    volumes:
      - ./config/nzbget:/config
      - /mnt/storage/DATA/Downloads:/downloads
    networks:
      - web
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.nzbget.rule=Host(`nzb.pinomagana.local`)"
      - "traefik.http.services.nzbget.loadbalancer.server.port=6789"

  # ======================
  # ARR APPS
  # ======================

  sonarr:
    image: lscr.io/linuxserver/sonarr:latest
    container_name: sonarr
    restart: unless-stopped
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/Merida
    volumes:
      - ./config/sonarr:/config
      - /mnt/storage/DATA/Downloads:/downloads
      - /mnt/storage/DATA/Media/TV Shows:/tv
    networks:
      - web
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.sonarr.rule=Host(`sonarr.pinomagana.local`)"
      - "traefik.http.services.sonarr.loadbalancer.server.port=8989"

  radarr:
    image: lscr.io/linuxserver/radarr:latest
    container_name: radarr
    restart: unless-stopped
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/Merida
    volumes:
      - ./config/radarr:/config
      - /mnt/storage/DATA/Downloads:/downloads
      - /mnt/storage/DATA/Media/Movies:/movies
    networks:
      - web
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.radarr.rule=Host(`radarr.pinomagana.local`)"
      - "traefik.http.services.radarr.loadbalancer.server.port=7878"

  prowlarr:
    image: lscr.io/linuxserver/prowlarr:latest
    container_name: prowlarr
    restart: unless-stopped
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/Merida
    volumes:
      - ./config/prowlarr:/config
    networks:
      - web
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.prowlarr.rule=Host(`prowlarr.pinomagana.local`)"
      - "traefik.http.services.prowlarr.loadbalancer.server.port=9696"

  bazarr:
    image: lscr.io/linuxserver/bazarr:latest
    container_name: bazarr
    restart: unless-stopped
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/Merida
    volumes:
      - ./config/bazarr:/config
      - /mnt/storage/DATA/Media:/media
    networks:
      - web
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.bazarr.rule=Host(`bazarr.pinomagana.local`)"
      - "traefik.http.services.bazarr.loadbalancer.server.port=6767"

  seerr:
    image: ghcr.io/seerr-team/seerr:latest
    container_name: seerr
    restart: unless-stopped
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/Merida
    volumes:
      - ./config/seerr:/config
    networks:
      - web
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.seerr.rule=Host(`requests.pinomagana.local`)"
      - "traefik.http.services.seerr.loadbalancer.server.port=5055"

networks:
  web:
    external: true